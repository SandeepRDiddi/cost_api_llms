name: Refresh LLM pricing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run exporter
        env:
          PYTHONPATH: src
        run: python -m cost_explorer

      - name: Commit updated workbook
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/llm_costs.xlsx
          if git diff --cached --quiet; then
            echo "No workbook changes to commit."
            exit 0
          fi
          git commit -m "Update master pricing workbook"
          git push

      - name: Upload pricing artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-pricing-workbook
          path: data/llm_costs.xlsx
