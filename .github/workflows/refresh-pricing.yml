name: Refresh LLM pricing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run exporter
        env:
          PYTHONPATH: src
        run: python -m cost_explorer

      - name: Upload pricing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-pricing-data
          path: |
            data/prices_current.csv
            data/prices_current.json
            data/source_status.csv
            data/prices_history.csv
            data/llm_costs.xlsx
            data/run_metadata.json
